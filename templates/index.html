<!DOCTYPE html>
<html>
<head>
    <title>Ask the Almighty Oracle</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, input {
            font-family: 'Montserrat', sans-serif;
        }
        body {
            padding: 20px;
            background-color: #dfe6e9;
            text-align: center;
            color: #596275;
        }
        .description {
            font-size: 1em;
            color: #1e272e;
            margin-bottom: 30px;
        }
        form {
            background-color: #b2bec3;
            padding: 20px;
            width: 60%;
            margin: 0 auto;
            box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.1);
            border-radius: 15px;
        }
        input[type=text] {
            width: 70%;
            padding: 12px 20px;
            margin: 8px 0;
            box-sizing: border-box;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        input[type=submit] {
            background-color: #6c757d;
            color: #fff;
            padding: 14px 20px;
            margin: 8px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 28%;
            float: right;
        }
        img {
            max-width: 100%;
            height: 400px;
            display: block;
            margin: 20px auto;
        }
        h1 {
            color: #c44569;
        }
        #answerBox {
            color: #fffff;
            margin-top: 30px;
        }

    </style>
</head>
<body>
<h1>Welcome!</h1>
<p class="description">Ever in need of a mystical prophecy?<br/>Want to know if you'll pass your exams or find your true
    love?<br/>This 8 ball has all the answers! Just ask your question below:</p>
<img src="/src/images/cat_8ball.png" alt="8 ball">
<form action="/" method="post">
    <label for="question">Your question:</label><br>
    <input type="text" id="question" name="question" required>
    <input type="submit" value="Ask Away!">
</form>

<div id="answerBox">
    <h2>The Almighty 8 ball Answers:</h2>
    <p id="answer">Add answer here....</p>
</div>
</body>
</html>
